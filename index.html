<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Badly Drawn Heroes</title>
    <link rel="stylesheet" href="css/style.css" />
    <script type="module" src="./js/main.js"></script>
  </head>

  <body>
    <div id="debug"></div>
    <canvas id="playArea"></canvas>

    <div id="interactionElements">
      <button class="interactionButton" id="lightAttack">Light Attack</button>
      <button class="interactionButton" id="heavyAttack">Heavy Attack</button>

      <div id="playerAttackArea" class="input-canvas-stack">
        <img id="frame" src="img/ui/frame.png" />
      </div>

      <button class="interactionButton" id="block">Block</button>
      <button class="interactionButton" id="heal">Heal</button>
    </div>
    <div id="drawTimer">60</div>
  </body>
</html>
